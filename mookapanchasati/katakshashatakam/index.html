<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">

    <title>कटाक्षशतकम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header h1 {
            font-size: 1.8em;
            flex: 1;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .header-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 25px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            font-size: 0.95em;
            flex-shrink: 0;
        }

        .sloka-text {
            font-size: 1.2em;
            line-height: 1.8;
            flex: 1;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.3em;
            }

            .header-buttons {
                flex-direction: column;
                gap: 5px;
            }

            .sloka-content {
                flex-direction: column;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>

        </div>
    </div>

    <div class="search-container">

    <div class="container">
        <div class="slokas-list" id="slokas-list">

    <script>
        const slokas = [{"num": 1, "preview": "मोहान्धकारनिवहं विनिहन्तुमीडे मूकात्मनामपि महाकवितावदान्यान् ।\nश्रीकाञ्चिदेशशिशिरीकृतिजागरूकान् एकाम्रनाथतरुणीकरुणावलोकान्॥"}, {"num": 2, "preview": "मातर्जयन्ति ममताग्रहमोक्षणानि माहेन्द्रनीलरुचिशिक्षणदक्षिणानि ।\nकामाक्षि कल्पितजगत्त्रयरक्षणानि त्वद्वीक्षणानि वरदानविचक्षणानि॥"}, {"num": 3, "preview": "आनङ्गतन्त्रविधिदर्शितकौशलानाम् आनन्दमन्दपरिघूर्णितमन्थराणाम् ।\nतारल्यमम्ब तव ताडितकर्णसीम्नां कामाक्षि खेलति कटाक्षनिरीक्षणानाम्॥"}, {"num": 4, "preview": "कल्लोलितेन करुणारसवेल्लितेन कल्माषितेन कमनीयमृदुस्मितेन ।\nमामञ्चितेन तव किंचन कुञ्चितेन कामाक्षि तेन शिशिरीकुरु वीक्षितेन॥"}, {"num": 5, "preview": "साहाय्यकं गतवती मुहुरर्जनस्य मन्दस्मितस्य परितोषितभीमचेताः ।\nकामाक्षि पाण्डवचमूरिव तावकीना कर्णान्तिकं चलति हन्त कटाक्षलक्ष्मीः॥"}, {"num": 6, "preview": "अस्तं क्षणान्नयतु मे परितापसूर्यम् आनन्दचन्द्रमसमानयतां प्रकाशम् ।\nकालान्धकारसुषुमां कलयन्दिगन्ते कामाक्षि कोमलकटाक्षनिशागमस्ते॥"}, {"num": 7, "preview": "ताटाङ्कमौक्तिकरुचाङ्कुरदन्तकान्तिः कारुण्यहस्तिपशिखामणिनाधिरूढः ।\nउन्मूलयत्वशुभपादपमस्मदीयं कामाक्षि तावककटाक्षमतङ्गजेतन्द्रः॥"}, {"num": 8, "preview": "छायाभरणे जगतां परितापहारी कारुण्यनाम विकिरन्मकरन्दजालं कामाक्षि राजति कटाक्षसुरद्रुमस्ते॥"}, {"num": 9, "preview": "सूर्याश्रयप्रणयिनी मणिकुण्डलांशु लौहित्यकोकनदकाननमाननीया ।\nयान्ती तव स्मरहराननकान्तिसिन्धुं कामाक्षि राजति कटाक्षकलिन्दकन्या॥"}, {"num": 10, "preview": "प्राप्नोति यं सुकृतिनं तव पक्षपातात् कामाक्षि वीक्षणविलासकलापुरन्ध्री ।\nसद्यस्तमेव किल मुक्तिवधूर्वृणीते तस्मान्नितान्तमनयोरिदमैकमत्यम्॥"}, {"num": 11, "preview": "यान्ती सदैव मरुतामनुकूलभावं भ्रूवल्लिशक्रधनुरुल्लसिता रसार्द्रा ।\nकामाक्षि कौतुकतरङ्गितनीलकण्ठा कादम्बिनीव तव भाति कटाक्षमाला॥"}, {"num": 12, "preview": "गङ्गाम्भसि स्मितमये तपनात्मजेव गङ्गाधरोरसि नवोत्पलमालिकेव ।\nवक्त्रप्रभासरसि शैवलमण्डलीव कामाक्षि राजति कटाक्षरुचिच्छटा ते॥"}, {"num": 13, "preview": "संस्कारतः किमपि कन्दलितान् रसज्ञ केदारसीम्नि सुधियामुपभोगयोग्यान् ।\nकल्याणसूक्तिलहरीकलमांकुरान्नः कामाक्षि पक्ष्मलयतु त्वदपाङ्गमेघः॥         let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 101 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.num}/`;

                const slokaText = sloka.preview.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${toDevanagari(sloka.num)}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    num: sloka.num,
                    text: sloka.preview,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
