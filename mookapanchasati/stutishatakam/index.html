<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्तुतिशतकम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .header h1 {
            font-size: 1.8em;
            flex: 1;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.1em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .header-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 25px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 50px;
            text-align: center;
            font-size: 0.95em;
            flex-shrink: 0;
        }

        .sloka-text {
            font-size: 1.2em;
            line-height: 1.8;
            flex: 1;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.3em;
            }

            .header-buttons {
                flex-direction: column;
                gap: 5px;
            }

            .sloka-content {
                flex-direction: column;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>स्तुतिशतकम्</h1>
            <div class="header-buttons">
                <a href="../" class="header-button">⌂ सूची</a>
            </div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 101 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
        </div>
    </div>

    <script>
        const slokas = [{"num": 1, "preview": "पाण्डित्यं परमेश्वरि स्तुतिविधौ नैवाश्रयन्ते गिरां वैरिञ्चान्यपि गुम्फनानि विगलद्गर्वाणि शर्वाणि ते ।\nस्तोतुं त्वां परिफुल्लनीलनलिनश्यामाक्षि कामाक्षि मां वाचालीकुरुते तथापि नितरां त्वत्पादसेवादरः॥"}, {"num": 2, "preview": "संसाराख्यतमोमुषे पुररिपोर्वामाङ्कसीमाजुषे ।\nकम्पातीरमुपेयुषे कवयतां जिह्वाकुटीं जग्मुषे विश्वत्राणपुषे नमोऽस्तु सततं तस्मै परंज्योतिषे॥"}, {"num": 3, "preview": "ये सन्ध्यारुणयन्ति शंकरजटाकान्तारचन्रार्भकं सिन्दूरन्ति च ये पुरन्दरवधूसीमन्तसीमान्तरे ।\nपुण्यं ये परिपक्कयन्ति भजतां काञ्चीपुरे माममी पायासुः परमेश्वरप्रणयिनीपादोद्भवाः पांसवः॥"}, {"num": 4, "preview": "कामाडम्बरपूरया शशिरुचा कम्रस्मितानां त्विषा कामारेरनुरागसिन्धुमधिकं कल्लोलितं तन्वती ।\nकामाक्षीति समस्तसज्जननुता कल्याणदात्री नृणां कारुण्याकुलमानसा भगवती कम्पातटे जृम्भते॥"}, {"num": 5, "preview": "कामाक्षीणपराक्रमप्रकटनं सम्भावयन्ती दृशा श्यामा क्षीरसहोदरस्मितरुचिप्रक्षालिताशान्तरा ।\nकामाक्षीजनमौलिभूषणमणिर्वाचां परा देवता कामाक्षीति विभाति कापि करुणा कम्पातटिन्यास्तटे॥"}, {"num": 6, "preview": "श्यामा काचन चन्द्रिका त्रिभुवने पुण्यात्मनामानने सीमाशून्यकवित्ववर्षजननी या कापि कादम्बिनी ।\nमारारातिमनोविमोहनविधौ काचितत्तमःकन्दली कामाक्ष्याः करुणाकटाक्षलहरी कामाय मे कल्पताम्॥"}, {"num": 7, "preview": "प्रौढध्वान्तकदम्बके कुमुदिनीपुण्यांकुरं दर्शयन् ज्योत्स्नासंगमनेऽपि कोकमिथुनं मिश्रं समुद्भावयन् ।\nकालिन्दीलहरीदशां प्रकटयन्कम्रां नभस्यद्भुतां कश्चिन्नेत्रमहोत्सवो विजयते काञ्चीपुरे शूलिनः॥"}, {"num": 8, "preview": "तन्द्राहीनतमालनीलसुषमैस्तारुण्यलीलागृहैः तारानाथकिशोरलाञ्छितकचैस्ताम्रारविन्देक्षणैः ।\nमातः संश्रयतां मनो मनसिजप्रागल्भ्यनाडिन्धमैः कम्पातीरचरैर्घनस्तनभरैः पुण्याङ्करैः शांकरैः॥"}, {"num": 9, "preview": "नित्यं निश्चलतामुपेत्य मरुतां रक्षाविधिं पुष्णती तेजस्संचयपाटवेन किरणानुष्णद्युतेर्मुष्णती ।\nकाञ्चीमध्यगतापि दीप्तिजननी विश्वान्तरे जृम्भते काचिच्चित्रमहो स्मृतापि तमसां निर्वापिका दीपिका॥"}, {"num": 10, "preview": "कान्तैः केशरुचां चयैर्भ्रमरितं मन्दस्मितैः पुष्पितं कान्त्या पल्लवितं पदाम्बुरुहयोर्नेत्रत्विषा पत्रितम् ।\nकम्प         let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 101 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.num}/`;

                const slokaText = sloka.preview.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${toDevanagari(sloka.num)}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    num: sloka.num,
                    text: sloka.preview,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
