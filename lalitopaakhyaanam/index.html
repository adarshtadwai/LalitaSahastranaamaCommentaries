<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ललितोपाख्यानम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 2em;
            margin: 0;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Search Container */
        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        /* List */
        .chapters-list {
            margin-top: 10px;
        }

        .chapter-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .chapter-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .chapter-item.hidden {
            display: none;
        }

        .chapter-item.highlight {
            background: #fff8dc;
        }

        .chapter-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .chapter-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        .chapter-count {
            font-size: 0.9em;
            color: #8B4513;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #8B4513;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .chapter-item {
                padding: 15px 20px;
            }

            .chapter-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .chapter-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ललितोपाख्यानम्</h1>
        <a href="../" class="home-button">⌂</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search chapters...">
        <div class="search-info" id="searchInfo">Showing all 41 chapters</div>
    </div>

    <div class="container">
        <div class="chapters-list" id="chapters-list">
            <!-- Chapters will be dynamically loaded -->
        </div>
    </div>

    <script>
        const chapters = [
            { number: 1, title: 'अगस्त्ययात्रा हयग्रीवदर्शनं परशक्त्युपासनोपदेशः', slokas: 41, folder: 'adhyaya-01' },
            { number: 2, title: 'दुर्वाससशापः इन्द्रः धर्माधर्मविचारः', slokas: 75, folder: 'adhyaya-02' },
            { number: 3, title: 'कुमार्गचरणप्रायश्चित्तकथनम्', slokas: 81, folder: 'adhyaya-03' },
            { number: 4, title: 'विश्वरूपकथा समुद्रमन्थनं लक्ष्म्याः उत्पत्तिः', slokas: 63, folder: 'adhyaya-04' },
            { number: 5, title: 'मोहिन्यवतारः भण्डासुरकथारम्भः ललितादेव्याः अवतारः', slokas: 84, folder: 'adhyaya-05' },
            { number: 6, title: 'भण्डासुरजन्म वरप्राप्तिः', slokas: 92, folder: 'adhyaya-06' },
            { number: 7, title: 'भण्डाभिषेकः विष्णुमायानिर्माणं ललितादेव्याः प्रादुर्भावः', slokas: 86, folder: 'adhyaya-07' },
            { number: 8, title: 'ललितास्तोत्रराजः', slokas: 77, folder: 'adhyaya-08' },
            { number: 9, title: 'ब्रह्मादीनां देव्याः दर्शनम्', slokas: 156, folder: 'adhyaya-09' },
            { number: 10, title: 'ललितायाः कामेश्वरस्य च विवाहः ललिताभिषेकः', slokas: 95, folder: 'adhyaya-10' },
            { number: 11, title: 'भण्डवधाय देव्याः प्रस्थानं सेनायात्रा', slokas: 60, folder: 'adhyaya-11' },
            { number: 12, title: 'चक्रराजरथगीतचक्ररथदेवताप्रकाशनम्', slokas: 129, folder: 'adhyaya-12' },
            { number: 13, title: 'किरिचक्ररथदेवताप्रकाशनम्', slokas: 53, folder: 'adhyaya-13' },
            { number: 14, title: 'भण्डपुरे उत्पाताः मन्त्राः', slokas: 33, folder: 'adhyaya-14' },
            { number: 15, title: 'विषङ्गस्य मन्त्रोपदेशः भण्डस्य दर्पः', slokas: 97, folder: 'adhyaya-15' },
            { number: 16, title: 'भण्डसेनासन्नाहः सम्पत्कार्याः दुर्मदवधः', slokas: 107, folder: 'adhyaya-16' },
            { number: 17, title: 'आरुढायाः कुरुण्डवधः', slokas: 103, folder: 'adhyaya-17' },
            { number: 18, title: 'नकुलीदेव्याः करङ्कपञ्चसेनापतिवधः', slokas: 110, folder: 'adhyaya-18' },
            { number: 19, title: 'तिरस्करिण्याः बालाहकसप्तसेनापतिवधः', slokas: 101, folder: 'adhyaya-19' },
            { number: 20, title: 'विषङ्गस्य रात्रौ माययुद्धं नित्यानां पराक्रमः', slokas: 230, folder: 'adhyaya-20' },
            { number: 21, title: 'अग्निकोटनिर्माणम्', slokas: 111, folder: 'adhyaya-21' },
            { number: 22, title: 'बालादेव्याः भण्डपुत्रवधः', slokas: 119, folder: 'adhyaya-22' },
            { number: 23, title: 'भण्डस्य विलापः विषुक्रमाया गणेशप्रादुर्भावः', slokas: 105, folder: 'adhyaya-23' },
            { number: 24, title: 'विषुक्रविषङ्गयोः युद्धं सुधासमुद्रप्रादुर्भावः', slokas: 116, folder: 'adhyaya-24' },
            { number: 25, title: 'ललिताभण्डयोः युद्धम्', slokas: 149, folder: 'adhyaya-25' },
            { number: 26, title: 'दिव्यास्त्रप्रयोगः भण्डवधः', slokas: 109, folder: 'adhyaya-26' },
            { number: 27, title: 'ब्रह्मणा ललितास्तुतिः मन्मथोज्जीवनं शिवपार्वतीविवाहः', slokas: 108, folder: 'adhyaya-27' },
            { number: 28, title: 'श्रीनगररचना सप्तप्राकारलक्षणम्', slokas: 69, folder: 'adhyaya-28' },
            { number: 29, title: 'मणिप्राकारवर्णनम्', slokas: 98, folder: 'adhyaya-29' },
            { number: 30, title: 'रुद्रमन्दिरवर्णनम्', slokas: 95, folder: 'adhyaya-30' },
            { number: 31, title: 'महापद्मवनवर्णनम्', slokas: 107, folder: 'adhyaya-31' },
            { number: 32, title: 'चिन्तामणिगृहान्तःवर्णनम्', slokas: 97, folder: 'adhyaya-32' },
            { number: 33, title: 'मुख्यप्रासादवर्णनम्', slokas: 104, folder: 'adhyaya-33' },
            { number: 34, title: 'मन्त्रस्य साधनस्य च वर्णनम्', slokas: 84, folder: 'adhyaya-34' },
            { number: 35, title: 'काञ्चीपुरमाहात्म्यम्', slokas: 123, folder: 'adhyaya-35' },
            { number: 36, title: 'त्रिपुरसुन्दर्या दशरथाय पुत्रदानम्', slokas: 143, folder: 'adhyaya-36' },
            { number: 37, title: 'श्रीयन्त्रपूजाविधिः', slokas: 85, folder: 'adhyaya-37' },
            { number: 38, title: 'मुद्राणां वर्णनम्', slokas: 21, folder: 'adhyaya-38' },
            { number: 39, title: 'देवीदर्शनदीक्षावर्णनम्', slokas: 90, folder: 'adhyaya-39' },
            { number: 40, title: 'मन्त्रोपासनाविधिः', slokas: 185, folder: 'adhyaya-40' },
            { number: 0, title: 'फलश्रुतिः', slokas: 32, folder: 'phala-shruti' }
        ];

        let allChapters = [];

        // Convert to Devanagari numerals
        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        // Search functionality
        function searchChapters(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allChapters.forEach(chapter => {
                const chapterText = chapter.text.toLowerCase();
                const shouldShow = !searchTerm || chapterText.includes(searchTerm);

                if (shouldShow) {
                    chapter.element.classList.remove('hidden');
                    chapter.element.classList.toggle('highlight', searchTerm && chapterText.includes(searchTerm));
                    visibleCount++;
                } else {
                    chapter.element.classList.add('hidden');
                    chapter.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} chapter${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 41 chapters';
            }
        }

        // Load all chapters
        function loadChapters() {
            const list = document.getElementById('chapters-list');

            chapters.forEach(chapter => {
                const item = document.createElement('a');
                item.className = 'chapter-item';
                item.href = `${chapter.folder}/`;

                let chapterNumber;
                if (chapter.number === 0) {
                    // Phala-shruti
                    chapterNumber = 'फलश्रुतिः';
                } else {
                    chapterNumber = toDevanagari(chapter.number);
                }

                item.innerHTML = `
                    <div class="chapter-content">
                        <div class="chapter-number">${chapterNumber}</div>
                        <div class="chapter-text">
                            ${chapter.title}
                        </div>
                    </div>
                `;

                list.appendChild(item);

                // Store chapter data for searching
                allChapters.push({
                    number: chapter.number,
                    text: chapterNumber + ' ' + chapter.title,
                    element: item
                });
            });

            // Setup search
            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchChapters(e.target.value);
            });
        }

        // Initialize
        loadChapters();
    </script>
</body>
</html>
