<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अष्टमः स्तबकः - चरित्रत्रयम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>अष्टमः स्तबकः</h1>
            <div class="subtitle">चरित्रत्रयम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "चरित्रत्रयम् (अनुष्टुब्वृत्तम्) तमसामभितो हन्ता चण्डिकाहासवासरः । सतां हृदयराजीवविकासाय प्रकल्पताम् ॥"
},
{
"number": 2,
"text": "या निद्रा सर्वभूतानां योगनिद्रा रमापतेः । ईड्यतां सा महाकाली महाकालसखी सखे ॥"
},
{
"number": 3,
"text": "विरिञ्चिना स्तुते मातः कालि त्वं चेन्न मुञ्चसि । मधुकैटभसंहारं करोतु कथमच्युतः ॥"
},
{
"number": 4,
"text": "वासवः काशनीकाशयशोलङ्कृतदिङ्मुखः । महोग्रविक्रमाद्यस्मादासीदाजौ पराङ्मुखः ॥"
},
{
"number": 5,
"text": "यत्प्रतापेन सन्तप्तो मन्ये बाडबरूपभृत् । भगवाननलोऽद्यापि सिन्धुवासं न मुञ्चति ॥"
},
{
"number": 6,
"text": "कुर्वाणे भूतकदनं यस्मिन्विस्मितचेतसः । एष एवान्तको नाहमित्यासीदन्तकस्य धीः ॥"
},
{
"number": 7,
"text": "रणे येनातिरस्कृत्य त्यक्तो राक्षस इत्यतः । चिराय हरिदीशेषु कोणेशः प्राप्तवान्यशः ॥"
},
{
"number": 8,
"text": "यन्नियन्तुमशक्तस्य कुर्वाणमसतीः क्रियाः । नियन्तुरसतामासीत्पाशिनो मलिनं यशः ॥"
},
{
"number": 9,
"text": "बाहुवीर्यपराभूतो यस्य प्रायेण मारुतः । बभूव क्षणदान्तेषु रतान्तपरिचारकः ॥"
},
{
"number": 10,
"text": "निधीन्येन जितो हित्वा राजराजः पलायितः । स्पष्टं बभाण माधुर्यं प्राणानामखिलादपि ॥"
},
{
"number": 11,
"text": "यस्मिन्नुत्तरपूर्वस्या दिश एकादशाधिपाः । कुण्ठा बभूवुरात्मीयकण्ठोपमितकीर्तयः ॥"
},
{
"number": 12,
"text": "निजशुद्धान्तकान्तानामाननैरेव निर्जितम् । ललज्जे यः पुनर्जित्वा शूरमानी सुधाकरम् ॥"
},
{
"number": 13,
"text": "बालस्येव क्रीडनकैः प्रवीरैर्यस्य खेलतः । लीलाकन्दुकधीरासीद्देवे दीधितिमालिनि ॥"
},
{
"number": 14,
"text": "त्रियामाचरशुद्धान्तभ्रूविलासनिवारणम् । विष्णोः सुदर्शनं चक्रं यस्य नापश्यदन्तरम् ॥"
},
{
"number": 15,
"text": "महिषं तं महावीर्यं या सर्वसुरदेहजा । अवधीद्दानवं तस्यै चण्डिकायै नमो नमः ॥"
},
{
"number": 16,
"text": "मुखं तवासेचनकं ध्यायं ध्यायं निरन्तरम् । मृगेन्द्रवाहे कालेन मृडस्त्वन्मुखतां गतः ॥"
},
{
"number": 17,
"text": "कार्तिकीचन्द्रवदना कालिन्दीवीचिदोर्लता । अरुणाम्भोजचरणा जयति त्रिरुचिः शिवा ॥"
},
{
"number": 18,
"text": "यत्ते कचभरः कालो यद्बाहुर्लोकरक्षकः । युक्तं द्वयं शिवे मध्यस्त्वसन्नाको न नाकराट् ॥"
},
{
"number": 19,
"text": "स्वदेहादेव या देवी प्रदीपादिव दीपिका । आविर्भभूव देवानां स्तुवतां हर्तुमापदः ॥"
},
{
"number": 20,
"text": "धैर्यचातुर्यगाम्भीर्यवीर्यसौन्दर्यशालिनीम् । रत्नं नितम्बिनीजातौ मेनिरे यां सुरासुराः ॥"
},
{
"number": 21,
"text": "यदीयहुङ्कृत्यनले धूम्राक्षोऽभवदाहुतिः । समाप्तिं भीषणं यावन्नैवावाप विकत्थनम् ॥"
},
{
"number": 22,
"text": "चामुंडाशिवदूत्यौ यत् कले दारुणविक्रमे । भक्षयामासतुर्मूर्तीः कीर्तिभिः सह रक्षसाम् ॥"
},
{
"number": 23,
"text": "यस्याः शूले जगामास्तं यशः शुम्भनिशुम्भयोः । नमामि विमलश्लोकां कौशिकीं नाम तामुमाम् ॥"
},
{
"number": 24,
"text": "यशोदागर्भजननाद् यशोदां गोकुलस्य ताम् । वन्दे भगवतीं नन्दां विन्ध्याचलनिवासिनीम् ॥"
},
{
"number": 25,
"text": "अम्बिकामुपतिष्ठन्तामेताश्चण्डीमनुष्टुभः । प्रसन्नाः साध्वलङ्काराः सिद्धपद्मेक्षणा इव ॥ ८.२५॥ 200"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
