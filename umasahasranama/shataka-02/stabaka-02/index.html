<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>षष्ठः स्तबकः - माहाभाग्यम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>षष्ठः स्तबकः</h1>
            <div class="subtitle">माहाभाग्यम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "माहाभाग्यम् (मदलेखावृत्तम्) हर्तारः शशिकीर्तेः कर्तारो नवभासाम् । भर्तारो मम सन्तु स्कन्दाम्बादरहासाः ॥"
},
{
"number": 2,
"text": "दिग्वल्लीष्वतिशुभ्रां कुर्वन्तः कुसुमर्द्धिम् । भूयासुस्तव भूत्यै मन्मातुः स्मितलेशाः ॥"
},
{
"number": 3,
"text": "एकश्चेत्तव शक्तो ब्रह्माण्डस्य भवाय । भर्गप्रेयसि हासः किं स्तोत्रं तव भूयः ॥"
},
{
"number": 4,
"text": "उद्याने वियदाख्ये कालि त्वां विहरन्तीम् । गोलैः कन्दुककल्पैरल्पा वाक्किमु माति ॥"
},
{
"number": 5,
"text": "खं क्रीडाभवनं ते कः कार्यालय एषः । पृथ्वीयं बहुलान्ना मातर्भोजनशाला ॥"
},
{
"number": 6,
"text": "बुद्धीनामसि दात्री सिद्धीनामसि नेत्री । वीर्याणामसि पेटी कार्याणामसि धाटी ॥"
},
{
"number": 7,
"text": "विद्यानामसि भावो हृद्यानामसि हावः । देवानामसि लीला दैत्यानामसि हेला ॥"
},
{
"number": 8,
"text": "गन्तॄणामसि चेष्टा स्थाणूनामसि निष्ठा । लोकानामसि मूलं लोकादेरसि जालम् ॥"
},
{
"number": 9,
"text": "देवी व्यापकतेजः शक्तिस्तत्त्वविचारे । अत्यन्तं सुकुमारी नारी मूर्तिविचारे ॥"
},
{
"number": 10,
"text": "क्व ज्योतिर्महतोऽस्मादाकाशादपि भूयः । तत्सर्वं विनयन्ती तन्वङ्गी क्व नु नारी ॥"
},
{
"number": 11,
"text": "देवेन्द्राय विभुत्वं सूर्यायोस्रसहस्रम् । ऊष्माणं दहनाय ज्योत्स्नामोषधिराजे ॥"
},
{
"number": 12,
"text": "वातायामितवीर्यं विस्तारं गगनाय । सान्द्रत्वं वसुधायै तोयाय द्रवभावम् ॥"
},
{
"number": 13,
"text": "माहाभाग्यमपारं कोटिभ्यो विबुधानाम् । चित्राः काश्चन सिद्धीर्लक्षेभ्यो मनुजानाम् ॥"
},
{
"number": 14,
"text": "स्थाणुभ्यो धृतिशक्तिं गन्तृभ्यो गतिशक्तिम् । कस्माच्चिन्निजकोशादेका देवि ददाना ॥"
},
{
"number": 15,
"text": "आश्चर्यं विदधाना सर्वं वस्तु दधाना । हन्त त्वं मम मातः काचित्कोमलगात्री ॥"
},
{
"number": 16,
"text": "श्रोणीभारनतायां कस्याञ्चित्तनुगात्र्याम् । ईदृक्षा यदि शक्तिः कावेतो ननु माया ॥"
},
{
"number": 17,
"text": "रूपं ते तनुगात्रं वाणी ते मृदुनादा । चापं ते मधुरेक्षुः पाणिस्ते सुकुमारः ॥"
},
{
"number": 18,
"text": "लोले लोचनयुग्मे भीरुत्वं प्रकटं ते । ब्रह्माण्डं त्वदधीनं श्रद्धत्तामिह को वा ॥"
},
{
"number": 19,
"text": "भ्रूभङ्गं कुरुषे चेन्मुग्धे गौरि मुखाब्जे । भूतान्यप्ययि बिभ्यत्येजेरन्नपि ताराः ॥"
},
{
"number": 20,
"text": "शुद्धान्तेश्वरि शम्भोरिच्छा चेत्तव काऽपि । घोरोऽग्निस्तृणगर्भाद्घोराग्नेरपि शैत्यम् ॥"
},
{
"number": 21,
"text": "द्रष्टुं विश्वमपारं भारस्ते दयितस्य । कर्तुं कार्यमशेषं श्रीमातस्तव भारः ॥"
},
{
"number": 22,
"text": "साक्षी केवलमीशः कर्तुं भर्तुमुताहो । हर्तुं वाऽखिलमम्ब त्वं साक्षाद्धृतदीक्षा ॥"
},
{
"number": 23,
"text": "कारङ्कारमुमे यद् ब्रह्माण्डानि निहंसि । तन्मन्ये सुरमान्ये बालैवाऽम्ब सदा त्वम् ॥"
},
{
"number": 24,
"text": "लीलोज्जीवितकामे रामे शङ्करसक्ते । त्वत्पादार्चनसक्तं भक्तं मां कुरु शक्तम् ॥"
},
{
"number": 25,
"text": "एताः पावनगन्धाः सर्वेशप्रमदे ते । हैरम्ब्यो मदलेखाः सन्तोषाय भवन्तु ॥ ६.२५॥ 150"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
