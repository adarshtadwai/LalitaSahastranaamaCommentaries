<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>एकोनचत्वारिंशः स्तबकः - प्रायो व्योमशरीरा</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>एकोनचत्वारिंशः स्तबकः</h1>
            <div class="subtitle">प्रायो व्योमशरीरा</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "व्याप्येदमिन्दोर्भुवनं य येव प्रायेण तस्यामलचन्द्रिकाऽभूत् । मन्दस्तवार्तिं स धुनोतु हासो निःशेषलोकेश्वरवल्लभायाः ॥"
},
{
"number": 2,
"text": "पूर्णे वियत्येकतटिज्ज्वलन्ती लोकानशेषाननिशं पचन्ती । मेघे कदाचिन्महसा स्फुरन्ती चण्डी प्रचण्डा हरतादघं नः ॥"
},
{
"number": 3,
"text": "गोलानि कान्यप्यधुनोद्भवन्ति जीर्यन्ति कान्यप्यखिलेशकान्ते यान्त्यम्बिके कान्यपि वृद्धिमत्र पाके भवत्याः परितः प्रवृत्ते ॥"
},
{
"number": 4,
"text": "भासां विनेत्रा महता ग्रहैश्च भूरिप्रमाणैर्युतमीशकान्ते । एकैकमण्डं तव लोमवच्चेत् कस्ते महद्भाग्यमिह ब्रवीतु ॥"
},
{
"number": 5,
"text": "नाथस्य ते रूपमणोरणीयो मातस्त्वदीयं महतो महीयः । जनाति यो देवि रहस्यमेतद् व्याख्यातुमेष प्रभवत्यशेषम् ॥"
},
{
"number": 6,
"text": "यद् गर्जितं वारिदघर्षणेषु शब्दस्तवायं सुगभीरघोषः । यल्लोकराज्ञि स्फुरितं तदेत दुज्जृम्भितं किञ्चन कान्तिवीचेः ॥"
},
{
"number": 7,
"text": "इन्द्रस्य वज्रं ज्वलितं कृशानोर् ज्योतिस्सहस्रच्छदबान्धवस्य । पीयूषभानोर्हसितं विसारि जीवस्य चक्षुर्मम तात दैवम् ॥"
},
{
"number": 8,
"text": "यस्यैव तेजः प्रविभक्तमर्क विद्युच्छशाङ्कानललोचनेषु । गूढं तदाकाशगृहे समन्ता दन्तानभिज्ञं प्रणमामि दैवम् ॥"
},
{
"number": 9,
"text": "जाग्रत्सु बुद्धिर्निमिषत्सु निद्रा शुष्केषु पक्तिस्तरुणेषु वृद्धिः । धीरेषु निष्ठा चपलेषु चेष्टा देवी ममापत्तिमपाकरोतु ॥"
},
{
"number": 10,
"text": "विद्यावतो वादविधानशक्तिर् वीरस्य सङ्ग्रामविधानशक्तिः । नारीमणेर्मोहविधानशक्तिर् लेशत्रयं किञ्चिदापारशक्तेः ॥"
},
{
"number": 11,
"text": "उत्साहयन्ती तपतां मनांसि सञ्चोदयन्ती च महाक्रियासु । सङ्क्षोभयन्ती हृदयं खलानां सम्मोहयन्ती च पराऽवतान्नः ॥"
},
{
"number": 12,
"text": "सञ्चालयन्ती सकलस्य देहं व्यानस्य शक्त्या परितो लसन्त्या । जेतुः प्रतापेऽस्ति पलायनेऽस्ति भीतस्य चेयं निखिलेशशक्तिः ॥"
},
{
"number": 13,
"text": "एकं स्वरूपं बहुचित्रयोगात् सन्दर्शयन्ती विविधं जनेभ्यः । सम्यग्दृशे स्वं विभुमर्पयन्ती सर्वादिमायैव महेशजाया ॥"
},
{
"number": 14,
"text": "यस्संश्रयेताखिलसङ्गतिस्त्वां ध्यानेन मन्त्रेण गुणस्तवैर्वा । त्रैलोक्यसाम्राज्यधुरन्धरस्य शुद्धान्तकान्ते स कृती मनुष्यः ॥"
},
{
"number": 15,
"text": "मूलाग्निमुद्दीप्य शिरश्शशाङ्कं सन्द्राव्य यस्तर्पयते कृती त्वाम् । तस्मिन्नगाधीश्वरकन्यके त्वं प्रादुर्भवन्ती न किमादधासि ॥"
},
{
"number": 16,
"text": "यस्त्वां सहस्रारसरोजमध्ये सोमस्वरूपां भजतेऽम्ब योगी । तस्यान्तरः शान्तिमुपैति तापो बाह्यस्य का नाम कथाऽल्पकस्य ॥"
},
{
"number": 17,
"text": "दण्डेन योऽन्तर्दहरेऽवतीर्णः प्राणेन वाचा महसा धिया वा । प्राप्नोति सोऽयं पुरमद्वितीयं यत्र त्वमीशा सह चित्रलीला ॥"
},
{
"number": 18,
"text": "तन्त्रोदितं विश्वविनेत्रि मन्त्रं यस्ते नरः संयमवानुपास्ते । रुद्राणि सान्द्राम्बुदकेशपाशे पाशैर्विमुक्तः स जयत्यशेषम् ॥"
},
{
"number": 19,
"text": "पद्मासनो द्वादशवर्णशान्ती दम्भोलिपाणिर्भुवनाधिनाथा । गीर्वाणमार्गो भृगुरब्जयोनिर् अन्ते तथाग्रे च हलां विराजी ॥"
},
{
"number": 20,
"text": "जम्भस्य हन्ताऽनलशान्तिचन्द्रैः संयुक्त ऊष्मा गलदेशजन्मा । दन्तस्थलीसम्भव ऊष्मवर्णो वाणीपतिर्वज्रधरश्च लज्जा ॥"
},
{
"number": 21,
"text": "विद्या त्वियं पञ्चदशाक्षराढ्या साक्षान्महामौनगुरूपदिष्टा । गोप्यासु गोप्या सुकृतैरवाप्या श्रेष्ठा विनुत्या परमेष्ठिनाऽपि ॥"
},
{
"number": 22,
"text": "देहेष्वियं कुण्डलिनी न्यगादि भूतेषु विद्युद् भुवनेषु चाभ्रम् । देवाङ्गनामस्तकलालिताङ्घ्रिर् देवी भवानी खलु देवतासु ॥"
},
{
"number": 23,
"text": "चक्षुर्विधायाचलमन्तरेण प्राणं प्रपश्यन् मनुवर्णरूपम् । संसेवते चेत्सकलस्य धात्रीं सर्वेष्टलाभो विदुषः करस्थः ॥"
},
{
"number": 24,
"text": "एकाक्षरीः पञ्चदशाक्षरीं वा विद्याः प्रकृष्टाः सकलेशशक्तेः । यो भक्तियुक्तः प्रजपेदमुष्य प्राणो वशे निस्तुलसिद्धियोनिः ॥"
},
{
"number": 25,
"text": "एताः कवीनां पदकिङ्करस्य पूताः प्रमोदं परमावहन्तु । गीतास्सभक्तिद्रवमिन्द्रवज्राः श्वेताचलाधीश्वरवल्लभायाः ॥ ३९.२५॥ 975"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
