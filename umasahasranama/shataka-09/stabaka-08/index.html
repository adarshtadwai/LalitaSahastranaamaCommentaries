<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>चत्वारिंशः स्तबकः - दैवगीतम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>चत्वारिंशः स्तबकः</h1>
            <div class="subtitle">दैवगीतम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "दैवगीतम् (पादाकुलकवृत्तम्) शमयतु पापं दमयतु दुःखं हरतु विमोहं स्फुटयतु बोधम् । प्रथयतु शक्तिं मन्दं हसितं मनसिजशासनकुलसुदृशो नः ॥"
},
{
"number": 2,
"text": "आर्द्रा दयया पूर्णा शक्त्या दृष्टिवशंवदविष्टपराजा । अखिलपुरन्ध्रीपूज्या नारी मम निश्शेषां विपदं हरतु ॥"
},
{
"number": 3,
"text": "शुद्धब्रह्मणि मोदो दैवं तत्र सिसृक्षति कामो दैवम् । सृजति पदार्थान् दृष्टिर्दैवं तान् बिभ्राणे महिमा दैवम् ॥"
},
{
"number": 4,
"text": "विकृतौ विकृतौ प्रकृतिर्दैवं विषये विषये सत्ता दैवम् । दृष्टौ दृष्टौ प्रमितिर्दैवं ध्याने ध्याने निष्ठा दैवम् ॥"
},
{
"number": 5,
"text": "स्फूर्तौ स्फूर्तौ माया दैवं चलने चलने शक्तिर्दैवम् । तेजसि तेजसि लक्ष्मीर्दैवं शब्दे शब्दे वाणी दैवम् ॥"
},
{
"number": 6,
"text": "हृदये हृदये जीवद्दैवं शीर्षे शीर्षे ध्यायद्दैवम् । चक्षुषि चक्षुषि राजद्दैवं मूले मूले प्रतपद्दैवम् ॥"
},
{
"number": 7,
"text": "अभितो गगने प्रसरद्दैवं पृथिवीलोके रोहद्दैवम् । दिनकरबिम्बे दीप्यद्दैवं सितकरबिम्बे सिञ्चद्दैवम् ॥"
},
{
"number": 8,
"text": "श्रावं श्रावं वेद्यं दैवं नामं नामं राध्यं दैवम् । स्मारं स्मारं धार्यं दैवं वारं वारं स्तुत्यं दैवम् ॥"
},
{
"number": 9,
"text": "श्रुतिषु वटूनां ग्राह्यं दैवं गृहिणामग्नौ तर्प्यं दैवम् । तपतां शीर्षे पुष्टं दैवं यतिनां हृदये शिष्टं दैवम् ॥"
},
{
"number": 10,
"text": "नमता पुष्पैः पूज्यं दैवं कविना पद्याराध्यं दैवम् । मुनिना मनसा ध्येयं दैवं यतिना स्वात्मनि शोध्यं दैवम् ॥"
},
{
"number": 11,
"text": "स्तुवतां वाचो विदधद्दैवं स्मरतां चेतः स्फुटयद्दैवम् । जपतां शक्तिं प्रथयद्दैवं नमतां दुरितं दमयद्दैवम् ॥"
},
{
"number": 12,
"text": "वाचो विनयद्वह्नौ दैवं प्राणान् विनयद्विद्युति दैवम् । कामान् विनयच्चन्द्रे दैवं बुद्धीर्विनयत्सूर्ये दैवम् ॥"
},
{
"number": 13,
"text": "हृदये निवसद् गृह्णद्दैवं वस्तौ निवसद्विसृजद्दैवम् । कण्ठे निवसत्प्रवदद्दैवं कुक्षौ निवसत्प्रपचद्दैवम् ॥"
},
{
"number": 14,
"text": "देहे निवसद्विलचद्दैवं पञ्चप्राणाकारं दैवम् । भागि समस्तस्यान्ने दैवं स्वाहाकारे तृप्यद्दैवम् ॥"
},
{
"number": 15,
"text": "बिभ्रन्नारीवेषं दैवं शुभ्रदरस्मितविभ्राड् दैवम् । अभ्रमदापहचिकुरं दैवं विभ्रमवासस्थानं दैवम् ॥"
},
{
"number": 16,
"text": "शीतज्योतिर्वदनं दैवं रुचिबिन्दूपमरदनं दैवम् । लावण्यामृतसदनं दैवं स्मररिपुलोचनमदनं दैवम् ॥"
},
{
"number": 17,
"text": "लक्ष्मीवीचिमदलिकं दैवं प्रज्ञावीचिमदीक्षं दैवम् । तेजोवीचिमदधरं दैवं सम्मदवीचिमदास्यं दैवम् ॥"
},
{
"number": 18,
"text": "करुणोल्लोलितनेत्रं दैवं श्रीकाराभश्रोत्रं दैवम् । कुसुमसुकोमलगात्रं दैवं कविवाग्वैभवपात्रं दैवम् ॥"
},
{
"number": 19,
"text": "हिमवति शैले व्यक्तं दैवं सितगिरिशिखरे क्रीडद्दैवम् । तुम्बुरुनारदगीतं दैवं सुरमुनिसिद्धध्यातं दैवम् ॥"
},
{
"number": 20,
"text": "क्वचिदपि रतिशतललितं दैवं क्वचिदपि सुतरां चण्डं दैवम् । भक्तमनोनुगवेषं दैवं योगिमनोनुगविभवं दैवम् ॥"
},
{
"number": 21,
"text": "चरिते मधुरं स्तुवतां दैवं चरणे मधुरं नमतां दैवम् । अधरे मधुरं शम्भोर्दैवं मम तु स्तन्ये मधुरं दैवम् ॥"
},
{
"number": 22,
"text": "भुजभृतविष्टपभारं दैवं पदधृतसम्पत्सारं दैवम् । लालितनिर्जरवीरं दैवं रक्षितसात्त्विकधीरं दैवम् ॥"
},
{
"number": 23,
"text": "चिच्छक्त्यात्मकमधितनु दैवं तटिदाकृत्यधिभूतं दैवम् । श्रुतिषु शिवेति प्रथितं दैवं जयति जगत्त्रयविनुतं दैवम् ॥"
},
{
"number": 24,
"text": "रमणमहर्षेरन्तेवासी मध्यमपुत्रो नरसिंहस्य । वासिष्ठोऽयं मरुतां मातुर्गणपतिरङ्घ्रिं शरणमुपैति ॥"
},
{
"number": 25,
"text": "त्रिभुवनभर्तुः परमा शक्तिस्सकलसवित्री गौरी जयति । तन्नुतिरेषा गणपतिरचिता पादाकुलकप्रान्ता जयति ॥ ४०.२५॥ 1000"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
