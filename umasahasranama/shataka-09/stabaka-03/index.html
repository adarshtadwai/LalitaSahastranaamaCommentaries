<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पञ्चत्रिंशः स्तबकः - प्रार्थना</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>पञ्चत्रिंशः स्तबकः</h1>
            <div class="subtitle">प्रार्थना</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "प्रार्थना (इन्दुवदनावृत्तम्) अन्धतमसं शशिविभामभिदधाना कान्तिमलमास्यकमलस्य विदधाना । अन्धकविरोधिदयितास्मितलवश्रीर् भातु भुवनस्य सकलस्य कुशलाय ॥"
},
{
"number": 2,
"text": "भाहि विविधा कृतिमती द्विजसमूहे पाहि गतिहीनमखिलेश्वरि कुलं नः । देहि बहुकालभजकाय वरमेतं याहि नगनन्दिनि यशः शशिवलक्षम् ॥"
},
{
"number": 3,
"text": "वारयति घोरतरपातकसमूहं वर्धयति धर्ममपि शर्मकरमन्ते । किङ्करजनस्य न किमावहति भव्यं शङ्करपुरन्ध्रि तव पादपरिचर्या ॥"
},
{
"number": 4,
"text": "यस्य मनुजस्य हृदयेऽस्ति सदये ते नाकचरसेव्यमयि पादसरसीजम् । तं भजति पद्ममुखि पद्मवनवासा लाभभवने भवतु नामरपुरोधाः ॥"
},
{
"number": 5,
"text": "यद्यखिलमौनिगणगीतगुणजालं कालभयहारिकरुणारसमरन्दम् । अद्रितनयाङ्घ्रिजलजन्म हृदये स्या दष्टमगतोऽपि विदधातु रविजः किम् ॥"
},
{
"number": 6,
"text": "लेखललनाकचसुमैः कृतबलिं ते यो भजति पादघृणिमालिनमनन्ते । निस्तरति नूनमयमस्तमितमोहः शोकतिमिरं सकललोकगणमातः ॥"
},
{
"number": 7,
"text": "शीतकरदर्पहरवक्त्रजलजाते शीतगिरिनन्दिनि तवाङ्घ्रिजलजातम् । यः स्मरति देवि हृदि विस्मरति सोऽयं विष्टपमशेषमपि कष्टततिमुक्तः ॥"
},
{
"number": 8,
"text": "सक्तिरयि यस्य तव पादसरसीजे शक्तिधरमातरनलाक्षगृहनाथे । पूर्णशशिजैत्रमुखि पुण्यपुरुषोऽसौ स्वर्णशिखरीव बुधलोकशरणं स्यात् ॥"
},
{
"number": 9,
"text": "वैरिगणनिर्दलनखड्गवरपाणे वाससि पदोर्दशनवाससि च शोणे । नेत्रमिषपावकविशेषितललाटे पापमखिलं जहि मृगाधिपतिघोटे ॥"
},
{
"number": 10,
"text": "वेदचयवेदिजनवादविषयस्य प्रतियुतलोकततिशोकशमनस्य । वेतनविवर्जितभटोऽयमहमङ्घ्रेः शीतकरपोतधरपुण्यवनिते ते ॥"
},
{
"number": 11,
"text": "कार्यमयि मे किमपि कार्यपटुबुद्धेः पादसरसीजयुगलीपरिजनस्य । अम्ब वद जम्भरिपुगीतगुणजाले शुम्भकुलनाशकरि शम्भुकुलयोषे ॥"
},
{
"number": 12,
"text": "त्वं यदि शिलावदयि नो वदसि कृत्यं नास्ति तव राज्यपटुबुद्धिरिति सत्यम् । आदिश यथार्हकरणीयकृतिनित्यं राज्ञि भुवनस्य चरणाम्बुरुहभृत्यम् ॥"
},
{
"number": 13,
"text": "पञ्चसु विहाय मनसः कमपि सङ्गं पुत्रधनमित्रजनबान्धववधूषु । एष भजते जननि पादजलजं ते पालय नु मुञ्च नु तवोपरि स भारः ॥"
},
{
"number": 14,
"text": "वज्रधरमुख्यसुरसञ्चयकिरीट स्थापितमहार्घमणिरञ्जितनखाय । जीवितमदायि जगदीश्वरि मदीयं पादजलजाय तव पालय नु मा वा ॥"
},
{
"number": 15,
"text": "देहि जगदीश्वरि न वा मदभिलाषं पाहि करुणावति न वा कुलमिदं नः । शूलधरकामिनि सुरासुरनिषेव्यं पादकमलं तव परे न विजहामि ॥"
},
{
"number": 16,
"text": "पासि किल पादयुगकिङ्करसमूहं हंसि किल पापततिमापदि नुता त्वम् । दन्तिवदनप्रसु वदन्ति मतिमन्तो नानृतमिदं भवतु नाकिजनवर्ण्ये ॥"
},
{
"number": 17,
"text": "शक्रमुखदेवततिवन्दितविसृष्टे वक्रघनकेशि चरणे तव लुठन्तम् । आपदि निमग्नमिममाश्रितमनाथं नन्दिहयसुन्दरि न पालयसि केन ॥"
},
{
"number": 18,
"text": "घोषमयमम्ब विदधाति पदलग्नो नावसि पुराणि किमु नारि बधिराऽसि । वन्दिसुरवृन्दनुतिभाषितहृतं वा कर्णयुगलं तव कपालिकुलयोषे ॥"
},
{
"number": 19,
"text": "अम्ब भव बिम्बफलकल्परदचेले शम्बरसपत्नबलकारिबहुलीले । प्रागमृतभानुमुकुटस्य मदयित्री तं कुरु ततः परमुरीकृतमदर्थम् ॥"
},
{
"number": 20,
"text": "निर्मलसुधाकरकलाकलितमस्ते धर्मरतपालिनि दयावति नमस्ते । एतमव देवि चरणाम्बुरुहबन्धुं शीतधरणीधरसुते गमय नान्धुम् ॥"
},
{
"number": 21,
"text": "अद्रिकुलपालककुलध्वजपताके भद्रगजगामिनि दरिद्रमयि मत्या । क्षुद्रमिव शोच्यमिममङ्घ्रिजलजाप्तं रुद्रदयिते जननि पाहि न जहीहि ॥"
},
{
"number": 22,
"text": "अस्तु तव पादकमले स्थितिरजस्रं नास्ति परदुःखविवशे हृदि तु शान्तिः । अस्तु करुणेऽयमस्तु मतिलोपः कष्टमिदमम्ब मम भूरि परिशिष्टम् ॥"
},
{
"number": 23,
"text": "दुःखसुखभेदरहिता न मतिरासीत् साधुखलभेदरहिता न मतिरासीत् । भाग्यमितिमान्यमथवा मम तदेतन् मातरिह सङ्घभजने यदवकाशः ॥"
},
{
"number": 24,
"text": "अस्तु मम भेदमतिरस्तु मम पक्षो यत्नपरताऽस्तु मम मास्तु च विमोक्षः । मोक्षमयि वेद्मि कुलकष्टततिमोक्षं प्रेषय सकृत्तव महेश्वरि कटाक्षम् ॥"
},
{
"number": 25,
"text": "शाक्वरगणेन मुखरेऽत्र गणनाथे विष्णुयशसीशवधु जिष्णुमुखवन्द्ये । अम्ब करुणां कुरु शिवङ्करि निरङ्क स्वच्छकिरणार्भकविभूषितललाटे ॥ ३५.२५॥ 875"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
