<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>द्वादशः स्तबकः - श‍ृङ्गारवर्णनम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>द्वादशः स्तबकः</h1>
            <div class="subtitle">श‍ृङ्गारवर्णनम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "श‍ृङ्गारवर्णनम् (रथोद्धतावृत्तम्) शर्वधैर्यगुणशातशस्त्रिका शम्बरारिजयकेतुपट्टिका । मन्दहासिकलिका मदापदं पर्वतेन्द्रदुहितुर्व्यपोहतु ॥"
},
{
"number": 2,
"text": "मुक्तभोगिकटकेन पाणिना मुग्धगात्रि परिगृह्य ते करम् । एकदा शशिकिशोरशेखरः सञ्चचार रजताद्रिभूमिषु ॥"
},
{
"number": 3,
"text": "तस्य तत्र परितः परिभ्रमन् वल्लभां वकुलपुष्पचुम्बिनीम् । पार्वति त्वदलकोपमद्युतिः च्ञ्चरीकतरुणो मनोऽधुनोत् ॥"
},
{
"number": 4,
"text": "प्रेयसीं चपलचारुलोचनामुल्लिखन् वपुषि श‍ृङ्गकोटिना । त्वद्विलोकितनिभैर्विलोकितैः धूर्जटेरमदयन्मनो मृगः ॥"
},
{
"number": 5,
"text": "मञ्जुकुञ्जभवनानि मालतीपुष्परेणुसुरभिः समीरणः । पेशला च पिकबालकाकली मोहमीश्वरि हरस्य तेनिरे ॥"
},
{
"number": 6,
"text": "अग्रतः कुसुमशोभिता लताः पार्श्वतस्त्वमगपालबालिके । सर्वतो मदनशिञ्जिनीध्वनिर्धीरता कथमिवास्य वर्तताम् ॥"
},
{
"number": 7,
"text": "कीरकूजितसमाकुले वने शम्भुमम्ब तव पार्श्ववर्तिनम् । आजघान मकरध्वजश्शरैरर्दयन्त्यवसरे हि शत्रवः ॥"
},
{
"number": 8,
"text": "ताडितो मकरकेतुना शरैरंसदेशमवलम्ब्य पणिना । एकहायनकुरङ्गलोचना त्वामिदं किल जगाद शङ्करः ॥"
},
{
"number": 9,
"text": "काकलीकलकलं करोत्यसौ बालचूतमधिरुह्य कोकिला । वाचमुद्गिर सरोजलोचने गर्वमुन्नतमियं विमुञ्चतु ॥"
},
{
"number": 10,
"text": "फुल्लकुन्दमकरन्दवाहिनो मल्लिकामुकुलधूलिधारिणः । कम्पयन्ति शिशवः समीरणाः पल्लवानि हृदयं च तन्वि मे ॥"
},
{
"number": 11,
"text": "वर्णनेन हृतचक्षुषः श्रियः सुप्रसन्नमधुराकृतीनि ते । अङ्गकानि दयिते भजेऽर्भकः स्वेदबिन्दुहरणेन वाऽनिलः ॥"
},
{
"number": 12,
"text": "तावदेव मम चेतसो मुदे बर्हमेतदनघाङ्गि बर्हिणः । यावदक्षिपथमेष विश्लथो गाहते न कबरीभरस्तव ॥"
},
{
"number": 13,
"text": "रागवानधर एष सन्ततं निर्मलद्विजसमीपवर्त्यपि । एभिरस्य सहवासतः प्रिये नेषदप्यपगतो निजो गुणः ॥"
},
{
"number": 14,
"text": "चक्षुषः सुदति ते सगोत्रता कैरवैर्निशि दिने कुशेशयैः । कश्यपैरपि वसिष्ठबान्धवैर्भूसुपर्वण इव द्विगोत्रिणः ॥"
},
{
"number": 15,
"text": "अल्पयाऽप्यतिसमर्थया स्मितज्योत्स्नया गगनगं हरत्तमः । केवलं सुवचनामृतं किरच्चन्द्रबिम्बमतुषारमाननम् ॥"
},
{
"number": 16,
"text": "नित्यमब्जमुखि ते परस्परश्लिष्टमश्लथपटीकुटीरगम् । शर्वरीभयविवर्जितं स्थलीचक्रवाकमिथुनं कुचद्वयम् ॥"
},
{
"number": 17,
"text": "लालनीयमयि देवमौलिभिः कोमलं चरणपल्लवद्वयम् । कच्चिदद्रिपुरुहूतपुत्रिके न स्थली तुदति कर्कशा तव ॥"
},
{
"number": 18,
"text": "एवमादि वदति त्रिलोचने त्वन्मुखे लसति मौनमुद्रया । आततान जलचारिकेतनो नर्तनं नगमहेन्द्रबालिके ॥"
},
{
"number": 19,
"text": "देवि ते पुरजितावतंसितः पारिजातकुसुमस्रजा कचः । मानसं पुरजितोऽमुना हृतं स्मर्यते क्व मलिनात्मना कृतम् ॥"
},
{
"number": 20,
"text": "ब्रह्मचर्यनियमादचञ्चला नायिका यदि लुलायमर्दिनी । नायकश्च सुमबाणसूदनो वेद को रतिरहस्यमावयोः ॥"
},
{
"number": 21,
"text": "लोचनोत्सवविधौ विशारदे वारिदावरणदोषवर्जिते । मर्दयत्यपि नभोगतं तमः श्यामिकारहितसुन्दराकृतौ ॥"
},
{
"number": 22,
"text": "भाति शीतकिरणस्तनन्धये प्राणनायकजटाकुटीजुषि । शुभ्रपर्वततटे शुभाङ्गि ते सम्मदाय न बभूव का निशा ॥"
},
{
"number": 23,
"text": "सन्तु भूषणसुधांशुदीधिति व्यक्तमुग्धमुखशोभयोर्मिथः । तानि तानि गिरिजागिरीशयोः क्रीडितानि जगतो विभूतये ॥"
},
{
"number": 24,
"text": "मोदकादनपरस्य सृष्टये क्रीडितं जननि वां किमप्यभूत् । शक्तिभृत्तनयरत्नजन्मने किञ्चिदीश्वरि बभूव खेलनम् ॥"
},
{
"number": 25,
"text": "माधुरीरसपरिप्लुता इमाः काव्यकण्ठविदुषो रथोद्धताः । आदधत्वचलनाथनन्दिनी मानसे कमपि मोदमुत्तमम् ॥ १२.२५॥ 300"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
