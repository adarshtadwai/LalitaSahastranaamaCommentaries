<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>पञ्चदशः स्तबकः - शक्तेः स्वागतम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>पञ्चदशः स्तबकः</h1>
            <div class="subtitle">शक्तेः स्वागतम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "शक्तेः स्वागतम् (स्वागतावृत्तम्) आपदामपहरन्तु ततिं नः सम्पदामपि दिशन्तु समृद्धिम् । दन्तकुन्दरुचिदत्तबलानि व्योमकेशसुदृशो हसितानि ॥"
},
{
"number": 2,
"text": "अल्पमप्यधिकशक्तिसमृद्धं मन्दमप्यधिकसूक्ष्मविसारम् । सुस्मितं स्मरविरोधिरमण्याः कल्पतां मम कुलस्य शुभाय ॥"
},
{
"number": 3,
"text": "पुष्कराद्रविमतो भुवमेतां भूमितश्शशधरं क्रममाणा । नैव मुञ्चति पदं बत पूर्वं नोत्तरं व्रजति नेशपुरन्ध्री ॥"
},
{
"number": 4,
"text": "भूषणेष्विव सवित्रि सुवर्णं मृत्तिकामिव घटेष्वखिलेषु । विश्ववस्तुषु निरस्तविशेषां देवि पश्यति सतीं विबुधस्त्वाम् ॥"
},
{
"number": 5,
"text": "किट्टभूतमखिलेश्वरजाये दृश्यजातमखिलं निजपाके । प्राणबुद्धिमनसामिह वर्गः सारभूत इति सूरिजनोक्तिः ॥"
},
{
"number": 6,
"text": "सारमीश्वरि तिलेष्विव तैलं विग्रहेषु निखिलेषु निगूढम् । ये धिया मथनतो विदुरेकं ते भवन्ति विबुधास्त्वयि लीनाः ॥"
},
{
"number": 7,
"text": "आयसं त्रिभुवनेश्वरि पिण्डं वह्निनेव तपसा तनुपिण्डम् । यस्य चिज्ज्वलनजालमयं स्यात् तप्तमम्ब स तवालयभूतः ॥"
},
{
"number": 8,
"text": "योऽरणेर्मथनतोऽतिपवित्रं वीतिहोत्रमिव वीतकलङ्कः । प्राणमुज्ज्वलयति स्वशरीरात् त्वामसावभयदेऽर्हति यष्टुम् ॥"
},
{
"number": 9,
"text": "प्राणता श्वसितमेव विचार्यं कुर्वता करणमेव निभाल्यम् । गच्छता गमनमेव विशोध्यं तत्तनौ मथनमागमबोध्यम् ॥"
},
{
"number": 10,
"text": "यो रसं पिबति मूर्धसरोजात् सोमपोऽयमनघः प्रयतात्मा । अग्निहोत्रमखिलेश्वरि नित्यं मूलकुण्डदहनस्थितिरस्य ॥"
},
{
"number": 11,
"text": "चिन्मयी पिबसि सोममिमं किं सोम एव किमसावसि मातः । पीयसे पिबसि च स्वयमेका पेयपातृयुगलं किमु भूत्वा ॥"
},
{
"number": 12,
"text": "तैजसं कनकमग्निवितप्तं तेज एव कनकाङ्गि यथा स्यात् । मोदरूपकलया तव तप्तं तन्मयं भवति मोदजपिण्डम् ॥"
},
{
"number": 13,
"text": "काऽपि मोदलहरी तव वीचिर् निर्गता दशशतारसुधाब्धेः । पूरयत्यखिलमम्ब शरीरं नेह वेद्मि परमे जडभागम् ॥"
},
{
"number": 14,
"text": "सेयमुत्तमतमा निपतन्ती शीतलाद्दशशतारपयोदात् । प्रेरितादखिलराज्ञि भवत्या बुद्धिसस्यमवताद्रसवृष्टिः ॥"
},
{
"number": 15,
"text": "दुग्धसिन्धुमथनादमृतं वा शब्दसिन्धुमथनात्प्रणवो वा । लभ्यते सुकृतिभिस्तव वीचिर् मूर्धकञ्जमथनाद्रस एषः ॥"
},
{
"number": 16,
"text": "अस्थिषु प्रवहति प्रतिवेगं मज्जसारममृतं विदधाना । बिभ्रती मदमनुष्णमदोषं मूर्धकञ्जनिलये तव धारा ॥"
},
{
"number": 17,
"text": "तैत्तिरीयकथितो रसलाभः सोऽयमेव सकलागमवर्ण्ये एतदेव शशिमण्डलनाथे तन्त्रभाषितपरामृतपानम् ॥"
},
{
"number": 18,
"text": "मूर्धसोममजरामररूपे युक्तवीक्षणकरेण निपीड्य । शम्भुसुन्दरि सुनोमि धिनोमि त्वां प्रदीप्तकुलकुण्डनिशान्ताम् ॥"
},
{
"number": 19,
"text": "दृष्टिरेव रविदीधितिरुग्रा शीर्षकञ्जशशिनं प्रविशन्ती । शीतलामृतमयी खलु भूत्वा योगिनो द्रवति मोदकला ते ॥"
},
{
"number": 20,
"text": "मूर्धनि द्रवसि योगयुतानां चक्षुषि ज्वलसि शङ्करभामे तिष्ठसि स्थिरपदा कुलकुण्डे बाह्यतः स्खलसि नैव कदाऽपि ॥"
},
{
"number": 21,
"text": "सा यदि द्रवति मोदकला स्यात् सा यदि ज्वलति चित्कलिका स्यात् । सा परा स्थिरपदा यदि तिष्ठ त्यक्षरा भवति काचन सत्ता ॥"
},
{
"number": 22,
"text": "पश्यता नयनमण्डलवृत्तिं गृह्यसे त्वमचलाधिपकन्ये । जानता दशशतारविलासं स्पृश्यसे विदितमम्ब रहस्यम् ॥"
},
{
"number": 23,
"text": "व्याप्तशक्त्यसुबलेन लसन्ती भानुबिम्बनयनेन तपन्ती । चन्द्रबिम्बमनसा विहरन्ती सा पुनर्जयति मूर्ध्नि वसन्ती ॥"
},
{
"number": 24,
"text": "स्वागतं सकललोकनुतायै स्वागतं भुवनराजमहिष्यै । स्वागतं मयि भृशं सदयायै स्वागतं दशशतारमितायै ॥"
},
{
"number": 25,
"text": "सत्कविक्षितिभुजो ललिताभिः स्वागताभिरनघाभिरिमाभिः । स्वागतं भणितमस्तु भवान्यै खेलनाय शिर एतदितायै ॥ १५.२५॥ 375"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
