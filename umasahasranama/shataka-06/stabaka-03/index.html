<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>त्रयोविंशः स्तबकः - प्रकीर्णकम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>त्रयोविंशः स्तबकः</h1>
            <div class="subtitle">प्रकीर्णकम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 25 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "विभुतयोररीकृतबहूद्भवौ । विदधतुर्जगत्त्रयमिदं शिवौ ॥"
},
{
"number": 2,
"text": "तव तु खेलने नलिनजाण्डकम् । गिरिशवल्लभे भवति कन्दुकम् ॥"
},
{
"number": 3,
"text": "सकलमस्त्युमे सदभयङ्करे । तव करे परे किमपि नो नरे ॥"
},
{
"number": 4,
"text": "किमिव वर्ण्यतां कशशिकुण्डला । उडुमणिस्रजाप्रविलसद्गला ॥"
},
{
"number": 5,
"text": "भण निरन्तरं बहुगुणामुमाम् । गतभयं विधेह्यमलवाणि माम् ॥"
},
{
"number": 6,
"text": "अव जहीहि वा ननु भजाम्यहम् । भुवनभर्त्रि ते चरणमन्वहम् ॥"
},
{
"number": 7,
"text": "गणपतेः शिरःकमलचुम्बिनी । भवतु गोपतिध्वजकुटुम्बिनी ॥"
},
{
"number": 8,
"text": "दहरमज्जनं विदधतं जनम् । परमदेवते नयसि धाम ते ॥"
},
{
"number": 9,
"text": "जननि विज्ञता भवतु धीमताम् । अनुभवस्तु ते करुणया सताम् ॥"
},
{
"number": 10,
"text": "अचलया धिया हृदि गवेषणम् । वृषहयप्रियानगरशोधनम् ॥"
},
{
"number": 11,
"text": "न विजहामि ते चरणनीरजम् । अवनि धीमतामव न वा निजम् ॥"
},
{
"number": 12,
"text": "पदमुमेऽम्ब ते हृदि विचिन्वते । पलितमस्तकाः परमदेवते ॥"
},
{
"number": 13,
"text": "स्वयमनामये सकलधात्र्यसि । निजमहिम्नि सा त्वमयि तिष्ठसि ॥"
},
{
"number": 14,
"text": "स्थितिमसादयँस्तव पदाम्बुजे । विधिमधिक्षिपत्यलसनीरजे ॥"
},
{
"number": 15,
"text": "स्यतु मदापदं शिववधूपदम् । यदृषयो विधुस्त्रिभुवनास्पदम् ॥"
},
{
"number": 16,
"text": "गुणगणं गृणँस्तव शिवे शिवम् । गतभयोऽभवं मदमितो नवम् ॥"
},
{
"number": 17,
"text": "तवकृपावशात् तदिदमव्यये । जननि नः प्लुतिस्तव यदङ्घ्रये ॥"
},
{
"number": 18,
"text": "नयनदृश्ययोरयि यदन्तरम् । तदमरस्तुते तव वपुः परम् ॥"
},
{
"number": 19,
"text": "अहमिति स्मृतिः क्व नु विभासते । इति विचोदयन् महति लीयते ॥"
},
{
"number": 20,
"text": "अमृतसंज्ञके सुखचिदात्मके । मतिमदर्थिते जननि धाम्नि ते ॥"
},
{
"number": 21,
"text": "अयि मुदास्पदं स्पृशति ते पदम् । श्वसितयात्रया सततदृष्टया ॥"
},
{
"number": 22,
"text": "दधतु सत्कवेर्गणपतेरिमाः । नगभुवो मुदं नरमनोरमाः ॥ २३.२५॥ 575"
},
{
"number": 23,
"text": "प्रकीर्णकम् (सुप्रतिष्ठावृत्तम्) चन्द्रिकासितं चण्डिकास्मितम् । भूतले सतां भातु भूतये ॥"
},
{
"number": 24,
"text": "भालचक्षुषश्चक्षुषां धनम् । किञ्चिदस्तु मे शस्तवर्धनम् ॥"
},
{
"number": 25,
"text": "साधुसन्ततिक्षेमकारिणी । घोरदानवानीकदारिणी ॥"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 25 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
