<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>उमासहस्रनाम</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 2em;
            margin: 0;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .chapters-list {
            margin-top: 10px;
        }

        .chapter-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .chapter-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .chapter-item.hidden {
            display: none;
        }

        .chapter-item.highlight {
            background: #fff8dc;
        }

        .chapter-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chapter-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .chapter-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        .chapter-count {
            font-size: 0.9em;
            color: #8B4513;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .chapter-item {
                padding: 15px 20px;
            }

            .chapter-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .chapter-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>उमासहस्रनाम</h1>
        <a href="../" class="home-button">⌂</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search shatakas...">
        <div class="search-info" id="searchInfo">Showing all 9 shatakas (995 total slokas)</div>
    </div>

    <div class="container">
        <div class="chapters-list" id="chapters-list">
            <!-- Shatakas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const shatakas = [{"number": 1, "name": "\u092a\u094d\u0930\u0925\u092e\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 99, "folder": "shataka-01"}, {"number": 2, "name": "\u0926\u094d\u0935\u093f\u0924\u0940\u092f\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 100, "folder": "shataka-02"}, {"number": 3, "name": "\u0924\u0943\u0924\u0940\u092f\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 100, "folder": "shataka-03"}, {"number": 4, "name": "\u091a\u0924\u0941\u0930\u094d\u0925\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 100, "folder": "shataka-04"}, {"number": 5, "name": "\u092a\u091e\u094d\u091a\u092e\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 100, "folder": "shataka-05"}, {"number": 6, "name": "\u0937\u0937\u094d\u0920\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 97, "folder": "shataka-06"}, {"number": 7, "name": "\u0938\u092a\u094d\u0924\u092e\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 99, "folder": "shataka-07"}, {"number": 8, "name": "\u0905\u0937\u094d\u091f\u092e\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 100, "folder": "shataka-08"}, {"number": 9, "name": "\u0928\u0935\u092e\u0902 \u0936\u0924\u0915\u092e\u094d", "slokas": 200, "folder": "shataka-09"}];

        let allShatakas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchShatakas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allShatakas.forEach(shataka => {
                const shatakaText = shataka.text.toLowerCase();
                const shouldShow = !searchTerm || shatakaText.includes(searchTerm);

                if (shouldShow) {
                    shataka.element.classList.remove('hidden');
                    shataka.element.classList.toggle('highlight', searchTerm && shatakaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    shataka.element.classList.add('hidden');
                    shataka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} shataka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 9 shatakas (995 total slokas)';
            }
        }

        function loadShatakas() {
            const list = document.getElementById('chapters-list');

            shatakas.forEach(shataka => {
                const item = document.createElement('a');
                item.className = 'chapter-item';
                item.href = `${shataka.folder}/`;

                const shatakaNumber = toDevanagari(shataka.number);

                item.innerHTML = `
                    <div class="chapter-content">
                        <div class="chapter-number">${shatakaNumber}</div>
                        <div class="chapter-text">
                            ${shataka.name}
                        </div>
                        <div class="chapter-count">${shataka.slokas} श्लोकाः</div>
                    </div>
                `;

                list.appendChild(item);

                allShatakas.push({
                    number: shataka.number,
                    text: shatakaNumber + ' ' + shataka.name,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchShatakas(e.target.value);
            });
        }

        loadShatakas();
    </script>
</body>
</html>
