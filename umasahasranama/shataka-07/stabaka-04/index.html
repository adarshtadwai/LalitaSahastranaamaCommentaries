<!DOCTYPE html>
<html lang="sa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अष्टाविंशः स्तबकः - रेणुकादिवर्णनम्</title>
    <link href="https://fonts.googleapis.com/css2?family=Annapurna+SIL:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Annapurna SIL', serif;
            background: linear-gradient(to bottom, #fdfbf7, #fff);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #8B0000, #8B4513);
            color: white;
            padding: 15px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            text-align: center;
        }

        .header .subtitle {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .header .home-button {
            position: absolute;
            right: 20px;
        }

        .home-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s;
        }

        .home-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .search-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            font-family: 'Annapurna SIL', serif;
            border: 2px solid #DAA520;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
            box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
        }

        .search-info {
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
            text-align: center;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .slokas-list {
            margin-top: 10px;
        }

        .sloka-item {
            background: white;
            border-radius: 8px;
            padding: 18px 30px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            border-left: 4px solid #DAA520;
        }

        .sloka-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2);
            border-left-color: #8B0000;
        }

        .sloka-item.hidden {
            display: none;
        }

        .sloka-item.highlight {
            background: #fff8dc;
        }

        .sloka-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sloka-number {
            background: #8B4513;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
            font-size: 0.9em;
        }

        .sloka-text {
            font-size: 1.3em;
            color: #333;
            flex: 1;
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .sloka-item {
                padding: 15px 20px;
            }

            .sloka-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .sloka-text {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>अष्टाविंशः स्तबकः</h1>
            <div class="subtitle">रेणुकादिवर्णनम्</div>
        </div>
        <a href="../" class="home-button">↑</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search slokas...">
        <div class="search-info" id="searchInfo">Showing all 24 slokas</div>
    </div>

    <div class="container">
        <div class="slokas-list" id="slokas-list">
            <!-- Slokas will be dynamically loaded -->
        </div>
    </div>

    <script>
        const slokas = [
{
"number": 1,
"text": "अन्तर्वलक्षपरिधिभ्रममादधानो वक्त्रस्य पूर्णतुहिनद्युतिमण्डलस्य । हासः करोतु भवतां परमं प्रमोदं शुद्धान्तपङ्कजदृशः प्रमथेश्वरस्य ॥"
},
{
"number": 2,
"text": "सम्मोहनानि तुहिनांशुकलाधरस्य सञ्जीवनानि सरसीरुहसायकस्य । सन्दीपनानि विनतेषु जनेषु शक्तेः संहर्षणानि मम सन्तु शिवास्मितानि ॥"
},
{
"number": 3,
"text": "पापानि मे हरतु काचन कृत्तशीर्षा माता पदाम्बुजभुजिष्यवितीर्णहर्षा । या भक्तलोकवरदानविधौ विनिद्रा वासं कमण्डलुधुनीपुलिने करोति ॥"
},
{
"number": 4,
"text": "षष्ठावतारजननावनिरेकवीरा भीमा धुनोतु दुरितानि गणाधिपस्य । या भक्तरक्षणविधावतिजागरूका पुण्ये कमण्डलुधुनीपुलिने चकास्ति ॥"
},
{
"number": 5,
"text": "छेदाय चेद् गतरजा मुनिरादिदेश चिच्छेद चेद्बहुगुणस्तनयः सवित्रीम् । दाह्यं शरीरमखिलप्रभुरीशशक्तिः यद्याविवेश च कथा परमाद्भुतेयम् ॥"
},
{
"number": 6,
"text": "पुत्रः प्रियस्तव शिरः सहसा चकर्त कृत्ता च हर्षभरिता भवती ननर्त । नो तस्य पापमपि नो तव काऽपि हानिः नाशोऽस्य हा भुजभुवामभवद्विपाकः ॥"
},
{
"number": 7,
"text": "अम्बैव सा सुरभिर्जुनभूपतिर्यां वीर्याज्जहार स च भार्गव आजहार । तस्या हतेः परगृहस्थितिरेव हेतुः गन्धर्वदर्शनकथा रिपुकल्पितैव ॥"
},
{
"number": 8,
"text": "छिन्नानि नो कति शरीरभृतां शिरांसि तत्पूज्यते जगति रैणुकमेव शीर्षम् । कृत्ताः कलेवरवतां कति नाभयो न चेतो धिनोति सुरभिर्मृगनाभिरेकः ॥"
},
{
"number": 9,
"text": "प्राणा वसन्ति शिरसा रहिते शरीरे लीलासरोजति शिरस्तु करेऽस्य कृत्तम् । तन्निघ्नमेतदखिलं च धियैव धीराः पश्यन्तु नन्दनगरे तदिदं विचित्रम् ॥"
},
{
"number": 10,
"text": "प्राणेश्वरी विधिपुरे लसतः पुरारे रङ्गीकरोतु शरणागतिमम्बिका मे । लब्धं निपीय यदुरोरुहकुम्भदुग्धं सम्बन्धमूर्तिरभवत्कविचक्रवर्ती ॥"
},
{
"number": 11,
"text": "अप्राप्य लोकरचनावनपातनेषु यस्यास्त्रयोऽपि पुरुषाः करुणाकटाक्षम् । नैवेशते किमपि सा जगदेकमाता भद्रा परा प्रकृतिरस्त्वघनाशिनी नः ॥"
},
{
"number": 12,
"text": "राका प्रबोधशशिनो हृदयोदयस्य नौका विपज्जलनिधौ पततां जनानाम् । वेदध्वजस्य ललिता त्रिरुचिः पताका काचिन्ममास्तु शरणं शिवमूलटीका ॥"
},
{
"number": 13,
"text": "मौलौ महेन्द्रसुदृशस्सुमनोनिकाय संशोभिते सदसि मान्य इवाभिजातः । रेणुश्च यच्चरणभूर्लभतेऽग्रपीठं त्राणाय सा भवतु भूतपतेर्वधूर्नः ॥"
},
{
"number": 14,
"text": "अम्बावृणोति परितोऽप्ययमन्धकारो नात्मानमेव मम किं तु कुलं च देशम् । शीघ्रं मदीयहृदयोदयपर्वताग्रे श्रीमानुदेतु तव पादमयूखमाली ॥"
},
{
"number": 15,
"text": "कष्टं धुनोतु मम पर्वतपुत्रिकायाः प्र्त्यग्रपङ्करुहबान्धवकान्तिकान्तम् । अम्भोरुहासनमुखामरमौलिरत्न ज्योतिर्विशेषितगुणं चरणारविन्दम् ॥"
},
{
"number": 16,
"text": "ज्याशिञ्जितानि समरे गिरिशं जिगीषोः कामस्य हंसनिवहस्य निमन्त्रणानि । धुन्वन्तु मे विपदमद्रिकुमारिकायाः पादारविन्दकटकक्वणितानि तानि ॥"
},
{
"number": 17,
"text": "यः सर्वलोकमथनं महिषं जिगाय यस्यैव कर्म दमनं च तदन्तकस्य । नारीनराकृतिभृतो महसस्तमङ्घ्रिं मञ्जीरनादमधुरं शरणं व्रजामि ॥"
},
{
"number": 18,
"text": "आपन्महोग्रविषराशिनिमग्नमेतं दीनं त्वदीयचरणं शरणं प्रपन्नम् । उद्धर्तुमम्ब करुणापरिपूर्णचित्ते वित्तेशमित्रकुलनारि तवैव भारः ॥"
},
{
"number": 19,
"text": "लोकाधिराज्ञि पतितं विपदन्धकूपे संरुद्धदृष्टिमभितस्तिमिरच्छटाभिः । मातः समुद्धर कृपाकलिते मृडानि पुत्रं करेण जगतामभयङ्करेण ॥"
},
{
"number": 20,
"text": "अस्य त्वदीयपदपङ्कजकिङ्करस्य दुर्भाग्यपाकविफलीकृतपौरुषस्य । प्राणेश्वरि प्रमथलोकपतेरुपायं वीक्षस्व तारणविधौ निपुणे त्वमेव ॥"
},
{
"number": 21,
"text": "मृत्युञ्जयोरुमणिपीठतटे निषण्णे ताटङ्ककान्तिबहुलीकृतगण्डशोभे । माणिक्यकङ्कणलसत्करवारिजाते जाते कुलाचलपतेर्जहि पातकं नः ॥"
},
{
"number": 22,
"text": "किं ते वपुर्जननि तप्तसुवर्णगौरं कामारिमोहिनि किमिन्दुकलावलक्षम् । पाकारिनीलमणिमेचककान्त्युताहो बन्धूकपुष्पकलिकारुचि वा स्मरामि ॥"
},
{
"number": 23,
"text": "त्वं सुन्दरी नृपतिजातिजितस्त्वमम्बा धूमावती त्वमजरे भुवनेश्वरी त्वम् । काली त्वमीश्वरि शुकार्भकधारिणी त्वं तारा त्वमाश्रितविपद्दलनासिधारा ॥"
},
{
"number": 24,
"text": "त्वं भैरवी भगवती बगलामुखी त्वं रामा च सा कमलकाननचारिणी त्वम् । कैलासवासिनयनामृतभानुरेखे को वेद ते जननि जन्मवतां विभूतीः ॥"
}
];

        let allSlokas = [];

        function toDevanagari(num) {
            const devanagariDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(num).split('').map(d => devanagariDigits[parseInt(d)]).join('');
        }

        function searchSlokas(query) {
            const searchTerm = query.toLowerCase().trim();
            let visibleCount = 0;

            allSlokas.forEach(sloka => {
                const slokaText = sloka.text.toLowerCase();
                const shouldShow = !searchTerm || slokaText.includes(searchTerm);

                if (shouldShow) {
                    sloka.element.classList.remove('hidden');
                    sloka.element.classList.toggle('highlight', searchTerm && slokaText.includes(searchTerm));
                    visibleCount++;
                } else {
                    sloka.element.classList.add('hidden');
                    sloka.element.classList.remove('highlight');
                }
            });

            const searchInfo = document.getElementById('searchInfo');
            if (searchTerm) {
                searchInfo.textContent = `Found ${visibleCount} sloka${visibleCount !== 1 ? 's' : ''}`;
            } else {
                searchInfo.textContent = 'Showing all 24 slokas';
            }
        }

        function loadSlokas() {
            const list = document.getElementById('slokas-list');

            slokas.forEach(sloka => {
                const item = document.createElement('a');
                item.className = 'sloka-item';
                item.href = `${sloka.number}/`;

                const slokaNumber = toDevanagari(sloka.number);
                const slokaText = sloka.text.trim().replace(/\n/g, '<br>');

                item.innerHTML = `
                    <div class="sloka-content">
                        <div class="sloka-number">${slokaNumber}</div>
                        <div class="sloka-text">${slokaText}</div>
                    </div>
                `;

                list.appendChild(item);

                allSlokas.push({
                    number: sloka.number,
                    text: slokaNumber + ' ' + sloka.text,
                    element: item
                });
            });

            const searchBox = document.getElementById('searchBox');
            searchBox.addEventListener('input', (e) => {
                searchSlokas(e.target.value);
            });
        }

        loadSlokas();
    </script>
</body>
</html>
